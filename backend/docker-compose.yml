services:
  postgres:
    image: postgres:15-alpine
    container_name: anl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anl
    volumes:
      # Postgres data lives on the dedicated Hetzner Volume (ID 105365621,
      # UUID b7395125-..., 10GB) mounted at /mnt/data via /etc/fstab.
      # Dir created on first deploy: mkdir -p /mnt/data/postgres
      - /mnt/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ads-network

  redis:
    image: redis:7-alpine
    container_name: ads-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ads-network

  backend:
    build: .
    container_name: ads-backend
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      - REDIS_URL=redis://redis:6379
      - SEQ_URL=http://seq:5341
    networks:
      - ads-network

  seq:
    image: datalust/seq:latest
    container_name: anl-seq
    ports:
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "anl-best-admin"
      SEQ_FIRSTRUN_REQUIREAPIKEYFORWRITINGEVENTS: "false"
    volumes:
      - seq_data:/data
    networks:
      - ads-network

networks:
  ads-network:
    driver: bridge

volumes:
  redis_data:
  seq_data:
  # postgres_data removed — using Hetzner Volume bind mount instead
