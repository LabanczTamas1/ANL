version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anl-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ads-network

  redis:
    image: redis:7-alpine
    container_name: ads-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ads-network

  backend:
    build: .
    container_name: ads-backend
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/anl
      - NODE_ENV=development
      - SEQ_URL=http://seq:5341
    volumes:
      - .:/usr/src/app
      # use a named volume for node_modules so it can be easily refreshed
      - backend_node_modules:/usr/src/app/node_modules
    command: sh -c "npm install && npm run dev:watch"
    networks:
      - ads-network

  seq:
    image: datalust/seq:latest
    container_name: anl-seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_data:/data
    networks:
      - ads-network

networks:
  ads-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  seq_data:
  # named volume for node_modules to avoid stale dependency issues
  backend_node_modules:
