name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: bash /opt/anl/scripts/deploy.sh

      - name: Notify success
        if: success()
        run: echo "✅ Deployed commit ${{ github.sha }} to VPS successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed for commit ${{ github.sha }}"
